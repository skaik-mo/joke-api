<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نكت بارق</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #0f0f1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #6c63ff, #a855f7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1rem;
      box-shadow: 0 0 32px rgba(108, 99, 255, 0.4);
    }

    h1 {
      color: #fff;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .subtitle {
      color: #888;
      font-size: 0.95rem;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.8rem 1.1rem;
      border-radius: 12px;
      border: 1.5px solid #2a2a3d;
      background: #1a1a2e;
      color: #fff;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      text-align: right;
    }

    input[type="text"]::placeholder { color: #555; }
    input[type="text"]:focus { border-color: #6c63ff; }

    button {
      padding: 0.8rem 1.4rem;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #6c63ff, #a855f7);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 1.8rem;
      justify-content: center;
    }

    .chip {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid #2a2a3d;
      background: #1a1a2e;
      color: #aaa;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .chip:hover {
      border-color: #6c63ff;
      color: #c4bfff;
      background: #1e1a3a;
    }

    .joke-card {
      background: #1a1a2e;
      border: 1.5px solid #2a2a3d;
      border-radius: 20px;
      padding: 2rem 1.8rem;
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: border-color 0.3s;
    }

    .joke-card.has-joke { border-color: #6c63ff44; }

    .joke-text {
      color: #e8e8f0;
      font-size: 1.2rem;
      line-height: 2;
      text-align: center;
      display: none;
    }

    .placeholder {
      color: #444;
      font-size: 1rem;
      text-align: center;
    }

    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #6c63ff;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1.1); opacity: 1; }
    }

    .loading-text { color: #666; font-size: 0.9rem; }

    .error-msg {
      display: none;
      color: #f87171;
      font-size: 0.95rem;
      text-align: center;
    }

    .actions {
      display: none;
      justify-content: center;
      gap: 10px;
      margin-top: 1.2rem;
    }

    .btn-secondary {
      background: transparent;
      border: 1.5px solid #2a2a3d;
      color: #aaa;
      font-size: 0.9rem;
      padding: 0.55rem 1.1rem;
    }

    .btn-secondary:hover {
      border-color: #6c63ff;
      color: #c4bfff;
      background: #1e1a3a;
      opacity: 1;
    }

    .word-badge {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 1rem;
    }

    .badge {
      background: #1e1a3a;
      border: 1px solid #6c63ff44;
      color: #a78bfa;
      font-size: 0.8rem;
      padding: 3px 12px;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="avatar">🎭</div>
      <h1>بارق</h1>
      <p class="subtitle">كوميديان غزاوي — بيحكيلك نكتة على أي كلمة</p>
    </div>

    <div class="input-row">
      <input
        type="text"
        id="wordInput"
        placeholder="اكتب أي كلمة..."
        autocomplete="off"
      />
      <button id="askBtn" onclick="fetchJoke()">اضحك 😂</button>
    </div>

    <div class="suggestions">
      <button class="chip" onclick="quickPick('مدرسة')">مدرسة</button>
      <button class="chip" onclick="quickPick('كهرباء')">كهرباء</button>
      <button class="chip" onclick="quickPick('طبيب')">طبيب</button>
      <button class="chip" onclick="quickPick('موبايل')">موبايل</button>
      <button class="chip" onclick="quickPick('رمضان')">رمضان</button>
      <button class="chip" onclick="quickPick('سيارة')">سيارة</button>
      <button class="chip" onclick="quickPick('شغل')">شغل</button>
    </div>

    <div class="word-badge" id="wordBadge">
      <span style="color:#555; font-size:0.85rem;">نكتة عن</span>
      <span class="badge" id="badgeText"></span>
    </div>

    <div class="joke-card" id="jokeCard">
      <p class="placeholder" id="placeholder">✨ اكتب كلمة وبارق يضحّكك</p>
      <div class="loading" id="loading">
        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <span class="loading-text">بارق عم يفكر...</span>
      </div>
      <p class="joke-text" id="jokeText"></p>
      <p class="error-msg" id="errorMsg"></p>
    </div>

    <div class="actions" id="actions">
      <button class="btn-secondary" onclick="fetchJoke()">🔄 نكتة ثانية</button>
      <button class="btn-secondary" onclick="copyJoke()">📋 انسخ</button>
    </div>

  </div>

  <script>
    const API_BASE = '/api/mohammed-skaik/joke';

    const input     = document.getElementById('wordInput');
    const askBtn    = document.getElementById('askBtn');
    const jokeCard  = document.getElementById('jokeCard');
    const placeholder = document.getElementById('placeholder');
    const loading   = document.getElementById('loading');
    const jokeText  = document.getElementById('jokeText');
    const errorMsg  = document.getElementById('errorMsg');
    const actions   = document.getElementById('actions');
    const wordBadge = document.getElementById('wordBadge');
    const badgeText = document.getElementById('badgeText');

    let currentWord = '';

    input.addEventListener('keydown', e => { if (e.key === 'Enter') fetchJoke(); });

    function quickPick(word) {
      input.value = word;
      fetchJoke();
    }

    function setState(state) {
      placeholder.style.display = 'none';
      loading.style.display     = 'none';
      jokeText.style.display    = 'none';
      errorMsg.style.display    = 'none';
      actions.style.display     = 'none';
      wordBadge.style.display   = 'none';
      jokeCard.classList.remove('has-joke');

      if (state === 'loading') {
        loading.style.display = 'flex';
        askBtn.disabled = true;
      } else if (state === 'joke') {
        jokeText.style.display = 'block';
        actions.style.display  = 'flex';
        wordBadge.style.display = 'flex';
        jokeCard.classList.add('has-joke');
        askBtn.disabled = false;
      } else if (state === 'error') {
        errorMsg.style.display = 'block';
        askBtn.disabled = false;
      } else {
        placeholder.style.display = 'block';
        askBtn.disabled = false;
      }
    }

    async function fetchJoke() {
      const word = input.value.trim();
      if (!word) {
        input.focus();
        return;
      }

      currentWord = word;
      setState('loading');

      try {
        const res = await fetch(`${API_BASE}?word=${encodeURIComponent(word)}`);
        const data = await res.json();

        if (res.status === 503) {
          throw new Error('⚙️ السيرفر مش مضبوط — OPENROUTER_API_KEY ناقصة');
        }

        if (!res.ok) {
          throw new Error(data.error || 'صار خطأ، حاول مرة ثانية');
        }

        jokeText.textContent = data.joke;
        badgeText.textContent = word;
        setState('joke');
      } catch (err) {
        errorMsg.textContent = err.message || 'في مشكلة بالاتصال، حاول مرة ثانية';
        setState('error');
      }
    }

    function copyJoke() {
      if (!jokeText.textContent) return;
      navigator.clipboard.writeText(jokeText.textContent).then(() => {
        const btn = document.querySelector('.actions .btn-secondary:last-child');
        const orig = btn.textContent;
        btn.textContent = '✅ انتسخت';
        setTimeout(() => btn.textContent = orig, 1800);
      });
    }
  </script>
</body>
</html>
